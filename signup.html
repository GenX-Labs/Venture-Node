<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venture Node - Sign Up</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --input-bg: #2a2a2a;
            --border-color: #333333;
            --accent-cyan: #00d2ff;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .header h2 {
            font-size: 18px;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        .header p {
            color: var(--accent-cyan);
            margin: 0;
            font-size: 16px;
        }

        .form-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-family: var(--font-family);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .radio-title {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .radio-label input[type="radio"] {
            accent-color: var(--accent-cyan);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .submit-btn {
            background-color: var(--accent-cyan);
            color: #000000;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        ::placeholder {
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Venture Node</h1>
            <h2>Mentor & Partner Matching System for Startups</h2>
            <p>Smart Matchmaking for Your Startup</p>
        </div>

        <div class="form-card">
            <form id="signupForm">
                
                <div class="radio-title">I am registering as a:</div>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="role" value="Mentor" checked>
                        Mentor
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="role" value="Tech Partner">
                        Tech Partner
                    </label>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Fatima Al-Fassi" required>
                </div>

                <div class="form-group">
                    <label for="email">Contact Email</label>
                    <input type="email" id="email" placeholder="e.g. fatima@mentorship.com" required>
                </div>

                <div class="form-group">
                    <label for="tags">Expertise Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="e.g. UI/UX, React, Node.js, Mobile Design" required>
                </div>

                <div class="form-group">
                    <label id="descriptionLabel" for="description">Professional Description</label>
                    <textarea id="description" placeholder="Describe your experience, what you excel at, and what you are looking for..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="availability">Availability Status</label>
                    <select id="availability" required>
                        <option value="" disabled selected>Select your current status</option>
                        <option value="Available">Available</option>
                        <option value="Unemployed">Unemployed / Actively Looking</option>
                        <option value="Employed">Employed / Open to side projects</option>
                        <option value="Limited">Limited Availability</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Create Profile</button>
            </form>
        </div>
    </div>

    <script>
        // Dynamic UI updates based on selected role
        const roleRadios = document.querySelectorAll('input[name="role"]');
        const descriptionLabel = document.getElementById('descriptionLabel');
        const submitBtn = document.getElementById('submitBtn');

        function updateFormUI() {
            const selectedRole = document.querySelector('input[name="role"]:checked').value;
            if (selectedRole === 'Mentor') {
                descriptionLabel.textContent = 'Mentorship Experience & Focus';
                submitBtn.textContent = 'Create Mentor Profile';
            } else {
                descriptionLabel.textContent = 'Technical Background & Goals';
                submitBtn.textContent = 'Create Tech Partner Profile';
            }
        }

        roleRadios.forEach(radio => {
            radio.addEventListener('change', updateFormUI);
        });

        // Initialize UI text on load
        updateFormUI();

        // Handle form submission and mock JSON generation
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Generate ID mock
            const randomIdNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            const role = document.querySelector('input[name="role"]:checked').value;
            const prefix = role === 'Mentor' ? 'mentor_' : 'partner_';
            
            // Process tags into an array
            const rawTags = document.getElementById('tags').value;
            const expertiseArray = rawTags.split(',').map(tag => tag.trim()).filter(tag => tag !== "");

            // Construct JSON object exactly like your example
            const profileData = {
                id: prefix + randomIdNum,
                name: document.getElementById('fullName').value,
                role: role,
                expertise_tags: expertiseArray,
                description: document.getElementById('description').value,
                email: document.getElementById('email').value,
                availability: document.getElementById('availability').value
            };

            console.log("New Profile Generated:\n", JSON.stringify(profileData, null, 2));
            alert(`Success! ${role} profile created.\nCheck the browser console to see the JSON output.`);
            
            // Reset form
            this.reset();
            updateFormUI();
        });
    </script>
</body>
</html>
